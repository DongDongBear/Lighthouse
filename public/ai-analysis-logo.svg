<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 放大镜主体 -->
  <circle cx="85" cy="85" r="50" stroke="#8B5CF6" stroke-width="8" fill="none"/>
  <line x1="122" y1="122" x2="170" y2="170" stroke="#8B5CF6" stroke-width="10" stroke-linecap="round"/>
  
  <!-- AI 芯片图案在放大镜内 -->
  <rect x="65" y="65" width="40" height="40" rx="6" stroke="#A78BFA" stroke-width="3" fill="none"/>
  
  <!-- 芯片引脚 -->
  <line x1="73" y1="65" x2="73" y2="55" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="85" y1="65" x2="85" y2="55" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="97" y1="65" x2="97" y2="55" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  
  <line x1="73" y1="105" x2="73" y2="115" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="85" y1="105" x2="85" y2="115" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="97" y1="105" x2="97" y2="115" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  
  <line x1="65" y1="73" x2="55" y2="73" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="65" y1="85" x2="55" y2="85" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="65" y1="97" x2="55" y2="97" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  
  <line x1="105" y1="73" x2="115" y2="73" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="85" x2="115" y2="85" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="97" x2="115" y2="97" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- 芯片中心 AI 文字 -->
  <text x="85" y="91" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#8B5CF6">AI</text>
  
  <!-- 数据分析折线 -->
  <polyline points="30,160 55,145 80,155 105,130 130,140 155,120" stroke="#C4B5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="55" cy="145" r="3" fill="#C4B5FD"/>
  <circle cx="80" cy="155" r="3" fill="#C4B5FD"/>
  <circle cx="105" cy="130" r="3" fill="#C4B5FD"/>
  <circle cx="130" cy="140" r="3" fill="#C4B5FD"/>
</svg>
