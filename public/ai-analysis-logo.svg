<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="64" fill="#1a1a2e"/>
  
  <!-- 中心大脑/芯片 -->
  <rect x="44" y="44" width="40" height="40" rx="8" stroke="#A78BFA" stroke-width="2.5" fill="none"/>
  
  <!-- 芯片引脚 - 上 -->
  <line x1="54" y1="44" x2="54" y2="36" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="44" x2="64" y2="36" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="44" x2="74" y2="36" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <!-- 芯片引脚 - 下 -->
  <line x1="54" y1="84" x2="54" y2="92" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="84" x2="64" y2="92" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="84" x2="74" y2="92" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <!-- 芯片引脚 - 左 -->
  <line x1="44" y1="54" x2="36" y2="54" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="64" x2="36" y2="64" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="74" x2="36" y2="74" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <!-- 芯片引脚 - 右 -->
  <line x1="84" y1="54" x2="92" y2="54" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="64" x2="92" y2="64" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="74" x2="92" y2="74" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>

  <!-- 引脚端点小圆 -->
  <circle cx="54" cy="34" r="2" fill="#C4B5FD"/>
  <circle cx="64" cy="34" r="2" fill="#C4B5FD"/>
  <circle cx="74" cy="34" r="2" fill="#C4B5FD"/>
  <circle cx="54" cy="94" r="2" fill="#C4B5FD"/>
  <circle cx="64" cy="94" r="2" fill="#C4B5FD"/>
  <circle cx="74" cy="94" r="2" fill="#C4B5FD"/>
  <circle cx="34" cy="54" r="2" fill="#C4B5FD"/>
  <circle cx="34" cy="64" r="2" fill="#C4B5FD"/>
  <circle cx="34" cy="74" r="2" fill="#C4B5FD"/>
  <circle cx="94" cy="54" r="2" fill="#C4B5FD"/>
  <circle cx="94" cy="64" r="2" fill="#C4B5FD"/>
  <circle cx="94" cy="74" r="2" fill="#C4B5FD"/>

  <!-- 放大镜 -->
  <circle cx="64" cy="64" r="18" stroke="#E0D4FF" stroke-width="2.8" fill="none" opacity="0.7"/>
  <line x1="77" y1="77" x2="96" y2="96" stroke="#E0D4FF" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

  <!-- 中心 AI 文字 -->
  <text x="64" y="69" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="16" font-weight="700" fill="#E0D4FF" letter-spacing="1">AI</text>
  
  <!-- 角落装饰数据点 -->
  <circle cx="22" cy="22" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="106" cy="22" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="22" cy="106" r="1.5" fill="#A78BFA" opacity="0.4"/>
  
  <!-- 外圈连接线 -->
  <path d="M34 34 L40 40" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
  <path d="M94 34 L88 40" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
  <path d="M34 94 L40 88" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
</svg>
